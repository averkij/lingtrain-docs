              - Лучшие практики: best-practices.md
              - Часто задаваемые вопросы: faq.md
              - Устранение неполадок: troubleshooting.md
            - Концепции:
              - Параллельные корпуса:
                - Что такое параллельный корпус?: what-is-parallel-corpus.md
                - Применение параллельных корпусов: parallel-corpora-applications.md
                - История параллельных книг: parallel-books-history.md
                - Как работают переводчики: translation-process.md
              - Теория выравнивания:
                - "Выравнивание текстов: теория": text-alignment-theory.md
                - История выравнивания текстов: history-of-alignment.md
                - Векторные представления предложений: sentence-embeddings.md
                - Косинусное сходство: cosine-similarity.md
              - Алгоритм:
                - Алгоритм выравнивания: algorithm.md
                - Пакетная обработка подробно: batch-processing-explained.md
                - Параметры окна и смещения: window-and-shift.md
                - Алгоритм разрешения конфликтов: conflict-resolution-algorithm.md
                - Руководство по визуализации: visualization-guide.md
                - Метрики качества: quality-metrics.md
                - Разбиение на предложения: sentence-splitting-deep-dive.md
                - Сравнение моделей эмбеддингов: embedding-models-comparison.md
              - Языки:
                - Поддерживаемые языки: supported-languages.md
                - Малоресурсные языки: low-resource-languages.md
                - Языковые семьи и проблемы: language-families.md
            - Справочник:
              - Справочник по разметке: markup-reference.md
              - Справочник форматов экспорта: export-formats-reference.md
              - Руководство по формату TMX: tmx-format-guide.md

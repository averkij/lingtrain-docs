site_name: Lingtrain Docs
site_url: https://averkij.github.io/lingtrain-docs/
theme:
  name: material
  logo: assets/logo.svg
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - content.tabs.link

markdown_extensions:
  - attr_list
  - toc:
      permalink: true
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - i18n:
      languages:
        - locale: en
          name: English
          build: true
          default: true
          nav:
            - Guide:
              - Overview: index.md
              - Getting started:
                - "Your First Alignment": tutorial-first-alignment.md
                - "Preparing Texts": tutorial-prepare-texts.md
                - Account and Settings: tutorial-account-settings.md
              - Using the Aligner:
                - Uploading texts: uploading.md
                - Alignment process: alignment.md
                - Conflict Resolution: tutorial-conflict-resolution.md
                - Editor Guide: tutorial-editor-guide.md
                - Multiple Batches: tutorial-multiple-batches.md
                - Quality Check: tutorial-quality-check.md
                - Interlinear translation: proxy.md
                - Interlinear Alignment: tutorial-proxy-alignment.md
                - Export: export.md
                - Export Formats: tutorial-export-formats.md
              - User Stories:
                - Creating a Parallel Book: tutorial-creating-parallel-book.md
                - Building a Parallel Corpus: tutorial-building-corpus.md
                - Building Translation Memory: tutorial-translation-memory.md
                - Preserving a Minority Language: tutorial-minority-language.md
              - Use Cases:
                - For Language Learners: use-cases-language-learners.md
                - For NLP Researchers: use-cases-researchers.md
                - For Professional Translators: use-cases-translators.md
                - For Publishers and Educators: use-cases-publishers.md
              - Best Practices: best-practices.md
              - FAQ: faq.md
              - Troubleshooting: troubleshooting.md
            - Concepts:
              - Parallel Corpora:
                - What is a Parallel Corpus?: what-is-parallel-corpus.md
                - Applications of Parallel Corpora: parallel-corpora-applications.md
                - Parallel Books History: parallel-books-history.md
                - How Translators Work: translation-process.md
              - Alignment Theory:
                - "Text Alignment: Theory and Methods": text-alignment-theory.md
                - History of Text Alignment: history-of-alignment.md
                - Sentence Embeddings Explained: sentence-embeddings.md
                - Understanding Cosine Similarity: cosine-similarity.md
              - Algorithm:
                - Alignment Algorithm: algorithm.md
                - Batch Processing in Detail: batch-processing-explained.md
                - Window and Shift Parameters: window-and-shift.md
                - Conflict Resolution Algorithm: conflict-resolution-algorithm.md
                - Visualization Guide: visualization-guide.md
                - Quality Metrics: quality-metrics.md
                - Sentence Splitting Deep Dive: sentence-splitting-deep-dive.md
                - Comparing Embedding Models: embedding-models-comparison.md
              - Languages:
                - Supported Languages: supported-languages.md
                - Working with Low-Resource Languages: low-resource-languages.md
                - Language Families and Challenges: language-families.md
            - Reference:
              - Markup Tags: markup-reference.md
              - Export Formats: export-formats-reference.md
              - TMX Format Guide: tmx-format-guide.md
              - Keyboard Shortcuts: keyboard-shortcuts.md
              - Glossary: glossary.md
              - Comparison with Alternatives: comparison-with-alternatives.md
              - "Where to Find Texts": appendix-text-sources.md
            - Python Library:
              - lingtrain-aligner: python-library.md
            - About:
              - Architecture Overview: architecture-overview.md
        - locale: ru
          name: Russian
          build: true
          nav:
            - Руководство:
              - Обзор: index.md
              - Начало работы:
                - "Первое выравнивание": tutorial-first-alignment.md
                - "Подготовка текстов": tutorial-prepare-texts.md
                - Аккаунт и настройки: tutorial-account-settings.md
              - Использование выравнивателя:
                - Загрузка текстов: uploading.md
                - Процесс выравнивания: alignment.md
                - Разрешение конфликтов: tutorial-conflict-resolution.md
                - Редактор: tutorial-editor-guide.md
                - Несколько пакетов: tutorial-multiple-batches.md
                - Проверка качества: tutorial-quality-check.md
                - Подстрочник: proxy.md
                - Выравнивание с подстрочником: tutorial-proxy-alignment.md
                - Экспорт: export.md
                - Форматы экспорта: tutorial-export-formats.md
              - Пользовательские истории:
                - Создание параллельной книги: tutorial-creating-parallel-book.md
                - Создание параллельного корпуса: tutorial-building-corpus.md
                - Создание памяти переводов: tutorial-translation-memory.md
                - Сохранение миноритарного языка: tutorial-minority-language.md
              - Варианты использования:
                - Для изучающих языки: use-cases-language-learners.md
                - Для исследователей NLP: use-cases-researchers.md
                - Для профессиональных переводчиков: use-cases-translators.md
